<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Wo ist Maya? — Escape Room Plattform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Caveat:wght@400..700&family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Source+Serif+Pro:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0b0c0f; color: #eaedf2; font-family: 'Inter', system-ui, sans-serif; min-height: 100%; }
    * { box-sizing: border-box; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    input::placeholder, textarea::placeholder { color: inherit; opacity: 0.4; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="variant-field.jsx"></script>
  <script type="text/babel" src="variant-signal.jsx"></script>
  <script type="text/babel" src="variant-wild.jsx"></script>
  <script type="text/babel" src="gamemaster.jsx"></script>

  <script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // Phone wrapper — a clean rectangle inside the iOS frame, so our layouts live in a predictable viewport
  function Phone({ children }) {
    return (
      <IOSDevice width={380} height={780} dark={false}>
        <div style={{ width: "100%", height: "100%", position: "relative" }}>
          {children}
        </div>
      </IOSDevice>
    );
  }

  // App — per-variant state machine + shared timer + hint progression
  function VariantApp({ Start, Hub, Chapter, initialTeam }) {
    const [screen, setScreen] = useState("start");
    const [teamName, setTeamName] = useState(initialTeam);
    const [completed, setCompleted] = useState([]);
    const [seconds, setSeconds] = useState(60 * 60);
    const [chapterStart, setChapterStart] = useState(null);

    useEffect(() => {
      if (screen === "start") return;
      const iv = setInterval(() => setSeconds(s => Math.max(0, s - 1)), 1000);
      return () => clearInterval(iv);
    }, [screen]);

    const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
    const ss = String(seconds % 60).padStart(2, "0");
    const timer = `${mm}:${ss}`;

    // hints unlock per chapter
    const chapterElapsedMin = chapterStart != null ? (60 * 60 - seconds - chapterStart) / 60 : 0;
    let hintsUnlocked = 0;
    if (chapterElapsedMin >= 3) hintsUnlocked = 1;
    if (chapterElapsedMin >= 6) hintsUnlocked = 2;
    if (chapterElapsedMin >= 9) hintsUnlocked = 3;

    return (
      <Phone>
        {screen === "start" && (
          <Start
            teamName={teamName}
            setTeamName={setTeamName}
            onStart={() => setScreen("hub")}
          />
        )}
        {screen === "hub" && (
          <Hub
            timer={timer}
            teamName={teamName}
            completed={completed}
            onPick={(id) => {
              if (id === "bahnhof" || completed.includes(id)) {
                setChapterStart(60 * 60 - seconds);
                setScreen("chapter:" + id);
              }
            }}
          />
        )}
        {screen.startsWith("chapter:") && (
          <Chapter
            timer={timer}
            hintsUnlocked={hintsUnlocked}
            onBack={() => setScreen("hub")}
            onComplete={(id) => {
              if (!completed.includes(id)) setCompleted([...completed, id]);
              setScreen("hub");
            }}
          />
        )}
      </Phone>
    );
  }

  // ---- Main app: design canvas with all variants ----
  function App() {
    // Gamemaster state, shared-ish (doesn't need to track player)
    const [gmSeconds, setGmSeconds] = useState(60 * 60 - (7 * 60 + 23)); // simulate 7:23 elapsed
    const [gmCompleted, setGmCompleted] = useState([]);
    const [gmHints, setGmHints] = useState(1);

    useEffect(() => {
      const iv = setInterval(() => setGmSeconds(s => Math.max(0, s - 1)), 1000);
      return () => clearInterval(iv);
    }, []);

    const gmTimer = `${String(Math.floor(gmSeconds / 60)).padStart(2,"0")}:${String(gmSeconds%60).padStart(2,"0")}`;

    return (
      <DesignCanvas title="Wo ist Maya? — Escape Room Plattform" subtitle="3 visuelle Varianten · Player (Smartphone) + Gamemaster (Tablet) · Masterarbeit 2026">

        <DCSection id="sec-players" title="Player-Flow · Smartphone · 3 visuelle Varianten" subtitle="Für die Jugendlichen vor Ort. Gleiche Screens, unterschiedliche Ästhetik. Klickbar — Start → 5 Spuren → Kapitel Bahnhof mit Story/Info/Event/Verifizierung.">

          <DCArtboard id="ab-field" label="1 · Field Notes — warm, analog, Detektiv-Akte" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <VariantApp Start={FieldStart} Hub={FieldHub} Chapter={FieldChapter} initialTeam="Sekundarschule 3a" />
            </div>
          </DCArtboard>

          <DCArtboard id="ab-signal" label="2 · Signal — dunkel, kryptisch, Aktivisten-Messenger" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center", background: "#0a0d0b" }}>
              <VariantApp Start={SignalStart} Hub={SignalHub} Chapter={SignalChapter} initialTeam="unit_9b" />
            </div>
          </DCArtboard>

          <DCArtboard id="ab-wild" label="3 · Wildgrün — hell, optimistisch, Natur & Lern-App" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <VariantApp Start={WildStart} Hub={WildHub} Chapter={WildChapter} initialTeam="Spurensucher 9b" />
            </div>
          </DCArtboard>

        </DCSection>

        <DCSection id="sec-gm" title="Gamemaster-Ansicht · Tablet/Laptop" subtitle="Für die Lehrperson / Spielleitung. Live-Status aller Teams, Tipp-Steuerung, Event-Log, Reset. Eine einheitliche Admin-Ästhetik für alle drei Player-Varianten.">

          <DCArtboard id="ab-gm" label="Gamemaster — Konsole (Live-Session, nach 7:23)" width={1200} height={780}>
            <Gamemaster
              timer={gmTimer}
              teamName="Sekundarschule 3a"
              completed={gmCompleted}
              hintsUnlocked={gmHints}
              onAdvance={(id) => setGmCompleted([...new Set([...gmCompleted, id])])}
              onRevealHint={() => setGmHints(Math.min(3, gmHints + 1))}
              onReset={() => { setGmCompleted([]); setGmHints(0); setGmSeconds(60*60); }}
            />
          </DCArtboard>

        </DCSection>

      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
