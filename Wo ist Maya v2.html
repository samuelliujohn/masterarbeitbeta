<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Wo ist Maya? v2 — Field Notes Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Caveat:wght@400..700&family=Kalam:wght@300;400;700&family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #1a1812; color: #eaedf2; font-family: 'Inter', system-ui, sans-serif; min-height: 100%; }
    * { box-sizing: border-box; }
    input::placeholder, textarea::placeholder { color: inherit; opacity: 0.4; }

    @keyframes fn-flip-in { from { opacity: 0; transform: translateY(14px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes fn-stamp-drop { 0% { opacity: 0; transform: rotate(var(--rot, 0deg)) scale(2.2); } 60% { opacity: 1; transform: rotate(var(--rot, 0deg)) scale(0.92); } 80% { transform: rotate(var(--rot, 0deg)) scale(1.06); } 100% { transform: rotate(var(--rot, 0deg)) scale(1); } }
    @keyframes fn-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @keyframes fn-flutter { 0%, 100% { transform: rotate(var(--rot, 0deg)) translateY(0); } 50% { transform: rotate(calc(var(--rot, 0deg) + 0.6deg)) translateY(-1px); } }
    .fn-flip-in { animation: fn-flip-in 0.5s ease-out; }
    .fn-stamp-drop { animation: fn-stamp-drop 0.55s cubic-bezier(.2,1.2,.4,1); }
    .fn-shake { animation: fn-shake 0.35s; }
    .fn-flutter { animation: fn-flutter 5s ease-in-out infinite; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>

  <!-- Field Notes v2 system -->
  <script type="text/babel" src="fn/atoms.jsx"></script>
  <script type="text/babel" src="fn/content.jsx"></script>
  <script type="text/babel" src="fn/verify.jsx"></script>
  <script type="text/babel" src="fn/screens.jsx"></script>

  <script>
  // Silence benign ResizeObserver loop warning from design canvas pan/zoom
  const __origConsoleError = console.error;
  console.error = function(...args) {
    if (args[0] && typeof args[0] === "string" && args[0].includes("ResizeObserver loop")) return;
    __origConsoleError.apply(console, args);
  };
  window.addEventListener("error", (e) => {
    if (e.message && e.message.includes("ResizeObserver loop")) {
      e.stopImmediatePropagation();
      e.preventDefault();
      return false;
    }
  }, true);
  const __ROErr = window.ResizeObserver;
  if (__ROErr) {
    window.ResizeObserver = class extends __ROErr {
      constructor(cb) {
        super((...a) => {
          window.requestAnimationFrame(() => { try { cb(...a); } catch(e){} });
        });
      }
    };
  }
  </script>
  <script type="text/babel">
  const { useState, useEffect } = React;

  // ───────────────────────────────────────────
  // Phone wrapper
  // ───────────────────────────────────────────
  function Phone({ children }) {
    return (
      <IOSDevice width={380} height={780} dark={false}>
        <div style={{ width: "100%", height: "100%", position: "relative", overflow: "hidden" }}>
          {children}
        </div>
      </IOSDevice>
    );
  }

  // ───────────────────────────────────────────
  // Player-App — drives the full flow
  // ───────────────────────────────────────────
  function PlayerApp({ initialTeam, startMode = "start" }) {
    const [screen, setScreen] = useState(startMode);     // start | intro | tutorial | hub | chapter:<id> | transition:<id> | ending
    const [teamName, setTeamName] = useState(initialTeam || "Sekundarschule 3a");
    const [completed, setCompleted] = useState([]);
    const [seconds, setSeconds] = useState(60 * 60);
    const [chapterStart, setChapterStart] = useState(null);

    // Timer ticks while playing
    useEffect(() => {
      if (screen === "start") return;
      const iv = setInterval(() => setSeconds(s => Math.max(0, s - 1)), 1000);
      return () => clearInterval(iv);
    }, [screen]);

    const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
    const ss = String(seconds % 60).padStart(2, "0");
    const timer = `${mm}:${ss}`;

    const elapsed = 60 * 60 - seconds;
    const chapterElapsedMin = chapterStart != null ? (elapsed - chapterStart) / 60 : 0;
    let hintsUnlocked = 0;
    if (chapterElapsedMin >= 3) hintsUnlocked = 1;
    if (chapterElapsedMin >= 6) hintsUnlocked = 2;
    if (chapterElapsedMin >= 9) hintsUnlocked = 3;

    const S = window.FN_SCREENS;
    const CHAPTERS = window.FN_DATA.CHAPTERS;
    const TRACKS = window.FN_DATA.TRACKS;

    // Derive current chapter id
    const chapterId = screen.startsWith("chapter:") ? screen.slice("chapter:".length)
                    : screen.startsWith("transition:") ? screen.slice("transition:".length) : null;
    const chapter = chapterId ? CHAPTERS[chapterId] : null;

    return (
      <Phone>
        {screen === "start" && (
          <S.FNStart
            teamName={teamName}
            setTeamName={setTeamName}
            onStart={() => setScreen("intro")}
          />
        )}
        {screen === "intro" && (
          <S.FNIntro onDone={() => setScreen("tutorial")} />
        )}
        {screen === "tutorial" && (
          <S.FNTutorial onDone={() => setScreen("hub")} />
        )}
        {screen === "hub" && (
          <S.FNHub
            timer={timer}
            teamName={teamName}
            completed={completed}
            tracks={TRACKS}
            onPick={(id) => {
              // Lock chapters in order; allow already-completed to revisit
              const idx = TRACKS.findIndex(t => t.id === id);
              const canEnter = completed.includes(id) || idx === completed.length;
              if (canEnter) {
                setChapterStart(elapsed);
                setScreen("chapter:" + id);
              }
            }}
          />
        )}
        {screen.startsWith("chapter:") && chapter && (
          <S.FNChapter
            chapter={chapter}
            timer={timer}
            hintsUnlocked={hintsUnlocked}
            onBack={() => setScreen("hub")}
            onComplete={(id) => {
              if (!completed.includes(id)) setCompleted([...completed, id]);
              setScreen("transition:" + id);
            }}
          />
        )}
        {screen.startsWith("transition:") && chapter && (
          <S.FNTransition
            chapter={chapter}
            onNext={() => {
              // After last chapter → ending; otherwise back to hub
              if (completed.length >= TRACKS.length) setScreen("ending");
              else setScreen("hub");
            }}
          />
        )}
        {screen === "ending" && (
          <S.FNEnding onReplay={() => {
            setCompleted([]); setSeconds(60 * 60); setScreen("start");
          }}/>
        )}
      </Phone>
    );
  }

  // ───────────────────────────────────────────
  // Main App — Design Canvas layout
  // ───────────────────────────────────────────
  function App() {
    // Gamemaster state, simulating a session 7:23 in
    const [gmSeconds, setGmSeconds] = useState(60 * 60 - (7 * 60 + 23));
    const [gmCompleted, setGmCompleted] = useState([]);
    const [gmHints, setGmHints] = useState(1);

    useEffect(() => {
      const iv = setInterval(() => setGmSeconds(s => Math.max(0, s - 1)), 1000);
      return () => clearInterval(iv);
    }, []);

    const gmTimer = `${String(Math.floor(gmSeconds / 60)).padStart(2,"0")}:${String(gmSeconds%60).padStart(2,"0")}`;
    const TRACKS = window.FN_DATA.TRACKS;

    return (
      <DesignCanvas
        title="Wo ist Maya? v2 — Field Notes Edition"
        subtitle="Komplette Plattform · 5 Spuren · Intro · Tutorial · Übergänge · Ende · Gamemaster · 8 Verifizierungs-Arten">

        {/* ──────────────── Section 1: Onboarding flow ──────────────── */}
        <DCSection
          id="sec-onboarding"
          title="01 · Einstieg"
          subtitle="Start → Chat-Intro mit Mayas letzten Nachrichten → 3-Karten-Tutorial → Korkbrett-Hub. Jeder Artboard ist ein klickbarer Prototyp.">

          <DCArtboard id="ab-start" label="Start — Akte öffnen" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <PlayerApp initialTeam="Sekundarschule 3a" startMode="start"/>
            </div>
          </DCArtboard>

          <DCArtboard id="ab-intro" label="Intro — Mayas letzte Nachrichten" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <PlayerApp initialTeam="Sekundarschule 3a" startMode="intro"/>
            </div>
          </DCArtboard>

          <DCArtboard id="ab-tutorial" label="Tutorial — Deine Werkzeuge" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <PlayerApp initialTeam="Sekundarschule 3a" startMode="tutorial"/>
            </div>
          </DCArtboard>

          <DCArtboard id="ab-hub" label="Hub — Korkbrett mit Speicher-Karte" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <PlayerApp initialTeam="Sekundarschule 3a" startMode="hub"/>
            </div>
          </DCArtboard>
        </DCSection>

        {/* ──────────────── Section 2: 5 Spuren ──────────────── */}
        <DCSection
          id="sec-chapters"
          title="02 · Die 5 Spuren"
          subtitle="Jedes Kapitel kombiniert Story-, Info-, Zeitungs- und Ereigniskarten mit einer eigenen Verifizierungs-Art. Am Ende: ein Übergang zur nächsten Spur.">

          <DCArtboard id="ab-ch1" label="Spur I · Mobilität — Bahnhof (Code)" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <PlayerApp initialTeam="Sekundarschule 3a" startMode="chapter:bahnhof"/>
            </div>
          </DCArtboard>

          <DCArtboard id="ab-ch2" label="Spur II · Konsum — Kassenbon (Multiple-Choice)" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <PlayerApp initialTeam="Sekundarschule 3a" startMode="chapter:supermarkt"/>
            </div>
          </DCArtboard>

          <DCArtboard id="ab-ch3" label="Spur III · Biodiversität — Vögelinsegg (Muster)" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <PlayerApp initialTeam="Sekundarschule 3a" startMode="chapter:wald"/>
            </div>
          </DCArtboard>

          <DCArtboard id="ab-ch4" label="Spur IV · Energie — Heizrechnung (Sequenz)" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <PlayerApp initialTeam="Sekundarschule 3a" startMode="chapter:wohngebiet"/>
            </div>
          </DCArtboard>

          <DCArtboard id="ab-ch5" label="Spur V · Klimagerechtigkeit — Holzkraftwerk (Cäsar)" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <PlayerApp initialTeam="Sekundarschule 3a" startMode="chapter:holzkraftwerk"/>
            </div>
          </DCArtboard>
        </DCSection>

        {/* ──────────────── Section 3: Ende ──────────────── */}
        <DCSection
          id="sec-ending"
          title="03 · Auflösung + Cliffhanger"
          subtitle="Maya gefunden — aber der Fall ist nicht vorbei. Die Beweise werden in der Gemeinderatssitzung am Freitag gebraucht.">

          <DCArtboard id="ab-ending" label="Akte geschlossen" width={420} height={820}>
            <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>
              <PlayerApp initialTeam="Sekundarschule 3a" startMode="ending"/>
            </div>
          </DCArtboard>
        </DCSection>

        {/* ──────────────── Section 4: Gamemaster ──────────────── */}
        <DCSection
          id="sec-gm"
          title="04 · Gamemaster-Konsole"
          subtitle="Für die Lehrperson. Live-Status aller 5 Spuren, manuelle Tipp-Freigabe, Event-Log, Reset. Im gleichen Field-Notes-Look — aber mit mehr Dichte und Übersicht.">

          <DCArtboard id="ab-gm" label="Gamemaster — Konsole (nach 7:23)" width={1200} height={760}>
            {window.FN_SCREENS.FNGamemaster && (
              <window.FN_SCREENS.FNGamemaster
                timer={gmTimer}
                teamName="Sekundarschule 3a"
                completed={gmCompleted}
                hintsUnlocked={gmHints}
                tracks={TRACKS}
                onAdvance={(id) => setGmCompleted([...new Set([...gmCompleted, id])])}
                onRevealHint={() => setGmHints(Math.min(3, gmHints + 1))}
                onReset={() => { setGmCompleted([]); setGmHints(0); setGmSeconds(60*60); }}
              />
            )}
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  // Wait for all modules to load (they run async via Babel)
  function boot() {
    if (!window.FN || !window.FN_DATA || !window.FN_VERIFY || !window.FN_SCREENS) {
      setTimeout(boot, 30);
      return;
    }
    // Inject animations
    if (window.FN.ANIMS) {
      const style = document.createElement("style");
      style.textContent = window.FN.ANIMS;
      document.head.appendChild(style);
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  }
  boot();
  </script>
</body>
</html>
